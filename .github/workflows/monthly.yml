name: Generate Monthly Lunch Calendar

on:
  # End of month runs (last day varies by month)
  schedule:
    - cron: '0 16 28 * *'   # Covers February (8am PT)
    - cron: '0 16 30 * *'   # Covers 30-day months
    - cron: '0 16 31 * *'   # Covers 31-day months
    # Early-month retries in case school posts the menu late
    - cron: '0 16 1 * *'    # 1st of month
    - cron: '0 16 3 * *'    # 3rd of month
    - cron: '0 16 5 * *'    # 5th of month
    - cron: '0 16 7 * *'    # 7th of month

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run menu fetcher
        run: python fetch_menu.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lunch.ics current_menu_id.txt
          git diff --staged --quiet || git commit -m "Update lunch calendar for $(date +'%B %Y')"
          git push
