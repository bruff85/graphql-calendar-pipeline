name: Generate Monthly Lunch Calendar

on:
  schedule:
    # Initial run on the 27th at 8pm PT (4:00 UTC next day)
    - cron: '0 4 28 * *'    # 27th 8pm PT = 28th 4:00 UTC
    # Daily retries at 10am PT (18:00 UTC) and 6pm PT (02:00 UTC next day)
    - cron: '0 18 * * *'    # 10am PT daily
    - cron: '0 2 * * *'     # 6pm PT daily

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run menu fetcher
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python fetch_menu.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lunch.ics current_menu_id.txt next_month_found.txt
          git diff --staged --quiet || git commit -m "Update lunch calendar for $(date +'%B %Y')"
          git push
